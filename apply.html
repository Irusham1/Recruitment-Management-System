<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply — TalentFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0D0F14; --surface:#161921; --surface2:#1E2330; --border:#272D3D; --text:#E8ECF4; --text2:#8892A4; --accent:#5B8DEF; --green:#6EE7B7; --red:#FCA5A5; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }

  .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); margin-bottom: 32px; display: flex; align-items: center; gap: 8px; }

  .apply-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 32px; width: 100%; max-width: 600px; }

  .job-header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 24px; }
  .job-emoji { font-size: 32px; margin-bottom: 8px; }
  .job-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
  .job-meta { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 8px; }
  .job-meta span { font-size: 12px; color: var(--text2); }

  h2 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 20px; }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif;
    outline: none; transition: border-color .2s; resize: vertical;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group input::placeholder, .form-group textarea::placeholder { color: var(--text2); }
  .form-group select option { background: var(--surface2); }

  .file-upload {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s;
    position: relative;
  }
  .file-upload:hover { border-color: var(--accent); }
  .file-upload input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .file-upload .upload-icon { font-size: 28px; margin-bottom: 8px; }
  .file-upload .upload-text { font-size: 13px; color: var(--text2); }
  .file-upload .file-name { font-size: 13px; color: var(--green); margin-top: 6px; display: none; }

  .submit-btn {
    width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: 12px;
    color: #fff; font-size: 15px; font-weight: 700; font-family: 'Syne', sans-serif;
    cursor: pointer; transition: all .2s; margin-top: 8px;
  }
  .submit-btn:hover { background: #4a7de0; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

  .success-msg {
    display: none; text-align: center; padding: 28px 20px;
  }
  .success-icon { font-size: 48px; margin-bottom: 12px; }
  .success-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 8px; }
  .success-sub { font-size: 14px; color: var(--text2); }

  .error-msg { font-size: 12px; color: var(--red); margin-top: 4px; display: none; }

  @media (max-width: 700px) {
    body { padding: 24px 14px; }
    .logo { margin-bottom: 20px; font-size: 20px; }
    .apply-card { padding: 20px; border-radius: 14px; }
    .job-title { font-size: 20px; }
    .job-meta { gap: 10px; }
    .file-upload { padding: 18px; }
    .file-upload .upload-text { font-size: 12px; }
  }

  @media (max-width: 420px) {
    .apply-card { padding: 16px; }
    .job-title { font-size: 18px; }
    .submit-btn { padding: 12px; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="logo">⬡ TalentFlow</div>

<div class="apply-card" id="applyCard">
  <div class="job-header" id="jobHeader">
    <!-- Filled by JS / PHP -->
    <div class="job-emoji" id="jobEmoji">💼</div>
    <div class="job-title" id="jobTitleDisplay">Loading...</div>
    <div class="job-meta" id="jobMeta"></div>
  </div>

  <h2>Your Application</h2>

  <form id="applyForm" enctype="multipart/form-data">
    <input type="hidden" name="job_id" id="jobIdField">

    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" name="candidate_name" placeholder="Your full name" required>
    </div>
    <div class="form-group">
      <label>Email Address *</label>
      <input type="email" name="candidate_email" placeholder="your@email.com" required>
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" name="candidate_phone" placeholder="+94 77 000 0000">
    </div>
    <div class="form-group">
      <label>Upload CV / Resume * (PDF or Word, max 5MB)</label>
      <div class="file-upload">
        <div class="upload-icon">📄</div>
        <div class="upload-text">Click or drag & drop your CV here</div>
        <div class="file-name" id="fileName"></div>
        <input type="file" name="cv" accept=".pdf,.doc,.docx" id="cvInput" required>
      </div>
      <div class="error-msg" id="cvError"></div>
    </div>
    <div class="form-group">
      <label>Cover Letter (optional)</label>
      <textarea name="cover_letter" rows="5" placeholder="Tell us why you're the right fit for this role..."></textarea>
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">Submit Application →</button>
  </form>

  <div class="success-msg" id="successMsg">
    <div class="success-icon">🎉</div>
    <div class="success-title">Application Submitted!</div>
    <div class="success-sub">Thank you! We'll review your application and be in touch soon.</div>
  </div>
</div>

<script>
  // Load job info from URL param (e.g. apply.html?job_id=1)
  const params = new URLSearchParams(location.search);
  const jobId  = params.get('job_id') || 1;
  document.getElementById('jobIdField').value = jobId;

  // In a real PHP setup, you'd fetch from /api/jobs.php?id=X
  // For demo purposes, static data
  const jobs = {
    1: { title: 'Senior Frontend Developer', dept: 'Engineering', loc: 'Colombo', type: 'Full-time', icon: '💻' },
    2: { title: 'Product Designer',          dept: 'Design',       loc: 'Remote',  type: 'Full-time', icon: '🎨' },
    3: { title: 'Marketing Manager',         dept: 'Marketing',    loc: 'Colombo', type: 'Full-time', icon: '📈' },
    4: { title: 'Backend Engineer',          dept: 'Engineering',  loc: 'Colombo', type: 'Full-time', icon: '⚙️' },
  };
  const job = jobs[jobId] || jobs[1];
  document.getElementById('jobEmoji').textContent = job.icon;
  document.getElementById('jobTitleDisplay').textContent = job.title;
  document.getElementById('jobMeta').innerHTML = `<span>🏢 ${job.dept}</span><span>📍 ${job.loc}</span><span>⏱ ${job.type}</span>`;

  // File name display
  document.getElementById('cvInput').addEventListener('change', function() {
    const fn = document.getElementById('fileName');
    if (this.files[0]) {
      fn.textContent = '✓ ' + this.files[0].name;
      fn.style.display = 'block';
    }
  });

  // Form submit
  document.getElementById('applyForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    // In production: POST to /api/applications.php
    // const formData = new FormData(this);
    // const res = await fetch('/api/applications.php', { method: 'POST', body: formData });

    // Demo: simulate success
    await new Promise(r => setTimeout(r, 1200));
    document.getElementById('applyForm').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  });
</script>
</body>
</html>
